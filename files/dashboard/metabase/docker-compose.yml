services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase-ptd-pilot
    ports:
      - "3000:3000"
    environment:
      MB_SITE_NAME: "PTD Dashboard Pilot"
      JAVA_TIMEZONE: "Asia/Hong_Kong"
    volumes:
      - metabase-data:/metabase-data
    restart: unless-stopped

volumes:
  metabase-data:
